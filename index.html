<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TriggerTemplate</title>
    <style>
      :root {
        color-scheme: light;
        --text: #111827;
        --muted: #667085;
        --line: #d8dee9;
        --yellow: #ffd400;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8fb;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      .logo {
        display: grid;
        width: 96px;
        height: 72px;
        place-items: center;
        border-radius: 24px;
        background: var(--yellow);
        color: #050505;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0;
        box-shadow: 0 18px 40px rgba(17, 24, 39, 0.12);
      }

      h1 {
        margin: 28px 0 12px;
        font-size: clamp(36px, 6vw, 60px);
        line-height: 1;
      }

      p {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: #fff;
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        background: #eef1f5;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">TT</div>
      <h1>TriggerTemplate</h1>
      <p>A lightweight Chrome text expander. Save reusable templates, type a trigger, and insert your saved text in supported webpage fields.</p>
      <nav>
        <a href="privacy.html">Privacy Policy</a>
        <a href="https://github.com/Fernando-Gamboa/TriggerTemplate">GitHub Repository</a>
      </nav>
    </main>
  </body>
</html>
