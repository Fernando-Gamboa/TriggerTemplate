<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TriggerTemplate</title>
    <style>
      :root {
        color-scheme: light;
        --text: #111827;
        --muted: #667085;
        --line: #d8dee9;
        --yellow: #ffd400;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8fb;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
        padding: 64px 0;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 0.82fr) minmax(320px, 1.18fr);
        gap: 36px;
        align-items: center;
      }

      .logo {
        display: grid;
        width: 96px;
        height: 72px;
        place-items: center;
        border-radius: 24px;
        background: var(--yellow);
        color: #050505;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0;
        box-shadow: 0 18px 40px rgba(17, 24, 39, 0.12);
      }

      h1 {
        margin: 28px 0 12px;
        font-size: clamp(36px, 6vw, 60px);
        line-height: 1;
      }

      p {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: #fff;
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        background: #eef1f5;
      }

      .hero-art {
        position: relative;
        min-height: 390px;
      }

      .promo-card {
        position: absolute;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 24px 60px rgba(17, 24, 39, 0.16);
      }

      .promo-card img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .promo-card.main {
        right: 0;
        top: 0;
        width: min(640px, 100%);
        aspect-ratio: 16 / 10;
      }

      .promo-card.small {
        left: 0;
        bottom: 0;
        width: min(280px, 46%);
        aspect-ratio: 11 / 7;
        transform: rotate(-3deg);
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-top: 56px;
      }

      .gallery figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 18px 42px rgba(17, 24, 39, 0.1);
      }

      .gallery img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 10;
        object-fit: cover;
      }

      .gallery figcaption {
        padding: 12px 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
      }

      @media (max-width: 860px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .hero-art {
          min-height: 320px;
        }

        .gallery {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div>
          <div class="logo">TT</div>
          <h1>TriggerTemplate</h1>
          <p>A lightweight Chrome text expander. Save reusable templates, type a trigger, and insert your saved text in supported webpage fields.</p>
          <nav>
            <a href="privacy.html">Privacy Policy</a>
            <a href="https://github.com/Fernando-Gamboa/TriggerTemplate">GitHub Repository</a>
          </nav>
        </div>

        <div class="hero-art" aria-label="TriggerTemplate screenshots">
          <div class="promo-card main">
            <img src="store-assets/screenshot-library-1280x800.png" alt="TriggerTemplate template library side panel">
          </div>
          <div class="promo-card small">
            <img src="store-assets/promo-small-440x280.png" alt="TriggerTemplate promotional graphic">
          </div>
        </div>
      </section>

      <section class="gallery" aria-label="Product screenshots">
        <figure>
          <img src="store-assets/screenshot-library-1280x800.png" alt="Saved templates library">
          <figcaption>Search and manage saved templates from the side panel.</figcaption>
        </figure>
        <figure>
          <img src="store-assets/screenshot-create-1280x800.png" alt="Create template form">
          <figcaption>Create reusable snippets with a trigger name, action, and template.</figcaption>
        </figure>
        <figure>
          <img src="store-assets/screenshot-side-tab-1280x800.png" alt="Draggable side tab">
          <figcaption>Keep the draggable tab tucked on the side until you need it.</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
