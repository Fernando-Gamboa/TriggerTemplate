<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trigger Template Test Page</title>
    <style>
      body {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      label {
        display: block;
        margin: 18px 0 8px;
        font-weight: 700;
      }

      input,
      textarea,
      [contenteditable] {
        width: 100%;
        min-height: 44px;
        border: 1px solid #ccd2dc;
        border-radius: 6px;
        padding: 10px;
        font: inherit;
      }

      [contenteditable] {
        min-height: 120px;
      }
    </style>
  </head>
  <body>
    <h1>Trigger Template Test Page</h1>
    <p>After loading the extension, create a template and type its trigger in each field.</p>

    <label for="search">Search input</label>
    <input id="search" type="search">

    <label for="textarea">Textarea</label>
    <textarea id="textarea"></textarea>

    <label for="editable">Content editable</label>
    <div id="editable" contenteditable="true"></div>
  </body>
</html>
